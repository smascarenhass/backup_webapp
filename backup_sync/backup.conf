# === Backup Configuration File ===
#
# This file configures automated backup jobs for the backup_sync system.
# Each section below is explained for clarity. Edit as needed to suit your requirements.

# ----- JOBS -----
# List of backup jobs to process.
# Format for each job: "PREFIX|SOURCE_PATH|DESTINATION_PATH"
# - PREFIX:      A unique name that will appear in the backup file and logs.
# - SOURCE_PATH: Absolute path (inside the container) to backup.
# - DEST_PATH:   Absolute path (inside the container) where backups will be stored.
#
# Paths must refer to directories mounted inside the container (see docker-compose.yml).
# Add or remove jobs as desired, each as a new string within the JOBS array.

JOBS=(
  "backup_aninha|/data/origem/aninha|/data/backup/sync/aninha"
  "backup_images|/data/origem/images|/data/backup/sync/images"
  "backup_docs|/data/origem/documents|/data/backup/sync/documents"
)

# ----- RETENTION_DAYS -----
# Number of days to keep old backup files.
# Files older than this will be deleted automatically.
# Set to 0 to disable deletion (keep all backups).
RETENTION_DAYS=1

# ----- LOG_FILE -----
# Path to the log file, inside the container, where backup events will be recorded.
# Leave blank to log only to stdout.
LOG_FILE=/var/log/backup/backup_compressed.log

# ----- CRON_SCHEDULE -----
# Schedule for running backups, in standard crontab format.
# Example: "0 3 * * *" = every day at 3:00 AM.
#
# Fields: 
#   minute (0-59)
#   hour (0-23)
#   day of month (1-31)
#   month (1-12)
#   day of week (0-7) (Sunday is 0 or 7)
#
# Common examples:
#   "0 2 * * *"        - every day at 2:00 AM
#   "30 23 * * 5"      - every Friday at 11:30 PM
#   "0 */6 * * *"      - every 6 hours
#
# Leave empty to use the default ("0 3 * * *") if unsure.

CRON_SCHEDULE="0 0 * * *"
