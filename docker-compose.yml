services:
  backup-webapp-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backup-webapp-api
    restart: unless-stopped
    environment:
      PORT: "8011"
      BACKUP_CONTAINER_NAME: backup_sync
      BACKUP_SCRIPT_PATH: /app/backup_sync.sh
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    command: npm run dev
    ports:
      - "8011:8011"

  backup-webapp-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
    container_name: backup-webapp-frontend
    restart: unless-stopped
    depends_on:
      - backup-webapp-api
    environment:
      VITE_API_PROXY_TARGET: http://backup-webapp-api:8011
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "5181:5173"
