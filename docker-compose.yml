services:
  backup-webapp-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backup-webapp-api
    restart: unless-stopped
    environment:
      PORT: "8011"
      BACKUP_CONTAINER_NAME: backup_sync
      BACKUP_SCRIPT_PATH: /app/backup_sync.sh
      BROWSE_BASE_PATH: /hdds/main
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /hdds/main:/hdds/main:ro
      - /hdds/backup:/hdds/backup
      - /var/run/docker.sock:/var/run/docker.sock
    command: npm run dev
    ports:
      - "8011:8011"

  backup-webapp-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      target: dev
    container_name: backup-webapp-frontend
    restart: unless-stopped
    depends_on:
      - backup-webapp-api
    environment:
      VITE_API_PROXY_TARGET: http://backup-webapp-api:8011
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5181:5173"

  backup_sync:
    build:
      context: ./backup_sync
      dockerfile: Dockerfile
    image: backup-sync:local
    container_name: backup_sync
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
      - BACKUP_CONFIG_FILE=/config/backup.conf
    volumes:
      - ./backup_sync/backup.conf:/config/backup.conf:ro
      - /hdds/main:/data/origem:ro
      - /hdds/backup:/data/backup
      - ./backup_sync/logs:/var/log/backup
